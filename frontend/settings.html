<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - AI Travel Planner</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div class="dashboard-container">
        <div class="sidebar">
            <ul>
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="tripdetails.html"><i class="fas fa-route"></i> Plan Your Trip</a></li>
                <li><a href="mytrips.html"><i class="fas fa-suitcase"></i> My Trips</a></li>
                <li><a href="expenses.html"><i class="fas fa-wallet"></i> Expenses</a></li>
                <li><a href="reports.html"><i class="fas fa-chart-pie"></i> Reports</a></li>
                <li class="active"><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
                <li><a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <div class="main-content">
            <h1>Account Settings</h1>
            
            <div class="settings-tabs">
                <button class="tab-btn active" data-tab="account-settings">Account</button>
                <button class="tab-btn" data-tab="password-settings">Password</button>
            </div>
            
            <div id="account-settings" class="tab-content active">
                <form id="accountForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" disabled>
                    </div>
                    <div class="form-group">
                        <label for="currentEmail">Current Email</label>
                        <input type="email" id="currentEmail" name="currentEmail" disabled>
                    </div>
                    <div class="form-group">
                        <label for="newEmail">New Email</label>
                        <input type="email" id="newEmail" name="newEmail" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Update Email</button>
                    </div>
                </form>
                <div id="accountMessage" class="message"></div>
            </div>
            
            <div id="password-settings" class="tab-content">
                <form id="passwordForm">
                    <div class="form-group">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" id="currentPassword" name="currentPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Update Password</button>
                    </div>
                </form>
                <div id="passwordMessage" class="message"></div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
